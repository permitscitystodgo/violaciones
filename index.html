<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plataforma de Entrenamiento - Búsqueda de Violaciones de Ciudades</title>
    
    <!-- Tailwind CSS para el diseño vivo y moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Plus Jakarta Sans', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
            color: #0f172a;
        }
        .luxury-shadow {
            box-shadow: 0 4px 12px -1px rgba(15, 23, 42, 0.03), 0 2px 4px -1px rgba(15, 23, 42, 0.02);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .luxury-shadow:hover {
            box-shadow: 0 20px 32px -12px rgba(13, 148, 136, 0.15), 0 4px 12px -4px rgba(13, 148, 136, 0.08);
            transform: translateY(-2px);
        }
    </style>
    
    <!-- Dependencias de React y Babel para JSX directo en el navegador -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="min-h-screen bg-slate-50pb-24 antialiased relative">

    <!-- Patrón geométrico e iluminación de fondo -->
    <div class="absolute inset-0 -z-10 bg-[linear-gradient(to_right,#0284c70a_1px,transparent_1px),linear-gradient(to_bottom,#0284c70a_1px,transparent_1px)] bg-[size:16px_28px] [mask-image:radial-gradient(ellipse_60%_50%_at_50%_0%,#000_80%,transparent_100%)]"></div>
    <div class="absolute top-0 right-1/4 -z-10 h-[380px] w-96 rounded-full bg-teal-400/10 blur-3xl"></div>
    <div class="absolute top-10 left-1/4 -z-10 h-[340px] w-96 rounded-full bg-amber-300/10 blur-3xl"></div>

    <div id="root"></div>

    <script type="text/babel">
        // Estructura de Ciudades optimizada para comprimir código sin repeticiones visuales
        const citiesConfig = [
            { name: "Hollywood", url: "https://drive.google.com/file/d/1ZDYxkVyQgthEbGf2wGj5agcV0XnIX1SO/view?usp=drive_web", cat: "Ciudad" },
            { name: "Miami Shores", url: "https://drive.google.com/file/d/13xt4lPZq7ICoHfaRlMloO4V0NW9L7uWY/view?usp=drive_web", cat: "Ciudad" },
            { name: "Miramar", url: "https://drive.google.com/file/d/1G_SdSucSov5vWdO-6Ef6ppZfs-mR25Lt/view?usp=drive_web", cat: "Ciudad" },
            { name: "North Bay Village", url: "https://drive.google.com/file/d/12C_ARovUgpcdhufyPTYdtGAHJNtPDgOr/view?usp=drive_web", cat: "Village" },
            { name: "Doral", url: "https://drive.google.com/file/d/1gq9YWpGrH_x7cXQF9phmTRfpJ-lufKPg/view?usp=drive_web", cat: "Ciudad" },
            { name: "Coral Springs", url: "https://drive.google.com/file/d/19AGVNICuLvPuFIQUhbyOUSkGCIZfH3Q8/view", cat: "Ciudad" },
            { name: "Coconut Creek", url: "#", cat: "Ciudad" },
            { name: "Cooper City", url: "#", cat: "Ciudad" },
            { name: "Dania Beach", url: "#", cat: "Ciudad" },
            { name: "Deerfield Beach", url: "#", cat: "Ciudad" },
            { name: "Fort Lauderdale", url: "#", cat: "Ciudad" },
            { name: "Hallandale Beach", url: "https://drive.google.com/file/d/1eWOmVEM-2E2-yLjZWX-KCMXEBbSZegE-/view?usp=sharing", cat: "Ciudad" },
            { name: "Lauderdale Lakes", url: "#", cat: "Ciudad" },
            { name: "Lauderhill", url: "#", cat: "Ciudad" },
            { name: "Lighthouse Point", url: "https://drive.google.com/file/d/15x8ATknnkquzeAV-nUnqJTYEVf70H812/view?usp=sharing", cat: "Ciudad" },
            { name: "Margate", url: "#", cat: "Ciudad" },
            { name: "North Lauderdale", url: "#", cat: "Ciudad" },
            { name: "Oakland Park", url: "#", cat: "Ciudad" },
            { name: "Parkland", url: "#", cat: "Ciudad" },
            { name: "Pembroke Pines", url: "https://drive.google.com/file/d/1WYi-z370S1L9u5m-PmTJUHuOoLPFzjYK/view?usp=sharing", cat: "Ciudad" },
            { name: "Plantation", url: "#", cat: "Ciudad" },
            { name: "Pompano Beach", url: "#", cat: "Ciudad" },
            { name: "Sunrise", url: "https://drive.google.com/file/d/1bbLy7y1V23gkgGqyoL9JUB-GpcDy-HAT/view?usp=sharing", cat: "Ciudad" },
            { name: "Tamarac", url: "#", cat: "Ciudad" },
            { name: "West Park", url: "#", cat: "Ciudad" },
            { name: "Weston", url: "#", cat: "Ciudad" },
            { name: "Wilton Manors", url: "#", cat: "Ciudad" },
            { name: "Davie", url: "#", cat: "Town" },
            { name: "Hillsboro Beach", url: "#", cat: "Town" },
            { name: "Pembroke Park", url: "#", cat: "Town" },
            { name: "Lazy Lake", url: "#", cat: "Village" },
            { name: "Sea Ranch Lakes", url: "#", cat: "Village" }
        ];

        // Mapea la configuración compacta a la lista completa de módulos interactivos
        const loadedModules = citiesConfig.map((city, idx) => {
            const id = idx + 1;
            const prefix = city.cat === "Town" ? "del Town de" : city.cat === "Village" ? "del Village de" : "Ciudad de";
            return {
                id,
                tag: `Módulo ${id}`,
                title: `Búsqueda Violaciones ${prefix} ${city.name}`,
                desc: city.url !== "#" 
                    ? `Material audiovisual instructivo para utilizar la búsqueda de violaciones y revisar registros vigentes en esta localidad.`
                    : `Sigue los pasos detallados de flujo manual en los registros estatales públicos para localizar violaciones en la región de ${city.name}.`,
                url: city.url,
                category: city.cat,
                cityName: city.name
            };
        });

        function App() {
            const [completedIds, setCompletedIds] = React.useState(() => {
                const stored = localStorage.getItem("completedModules_SingleFile");
                return stored ? JSON.parse(stored) : [];
            });

            const [searchQuery, setSearchQuery] = React.useState("");
            const [selectedCategory, setSelectedCategory] = React.useState("All");
            const [statusFilter, setStatusFilter] = React.useState("All");
            const [activeInfoModal, setActiveInfoModal] = React.useState(null);

            React.useEffect(() => {
                localStorage.setItem("completedModules_SingleFile", JSON.stringify(completedIds));
            }, [completedIds]);

            const handleToggleComplete = (id) => {
                setCompletedIds(prev => 
                    prev.includes(id) ? prev.filter(mId => mId !== id) : [...prev, id]
                );
            };

            const handleReset = () => {
                if (confirm("¿Deseas reiniciar todo tu progreso de entrenamiento?")) {
                    setCompletedIds([]);
                }
            };

            // Filtrado dinámico
            const filtered = React.useMemo(() => {
                return loadedModules.filter(module => {
                    const matchesSearch = module.title.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                         module.desc.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = selectedCategory === "All" || module.category === selectedCategory;
                    const isDone = completedIds.includes(module.id);
                    const matchesStatus = statusFilter === "All" || 
                                         (statusFilter === "Completed" && isDone) || 
                                         (statusFilter === "Pending" && !isDone);
                    return matchesSearch && matchesCategory && matchesStatus;
                });
            }, [searchQuery, selectedCategory, statusFilter, completedIds]);

            // Estadísticas
            const total = loadedModules.length;
            const completedCount = completedIds.length;
            const progressPercentage = Math.round((completedCount / total) * 100) || 0;

            const categoryCounts = React.useMemo(() => {
                const counts = { All: total, Ciudad: 0, Town: 0, Village: 0 };
                loadedModules.forEach(m => counts[m.category] += 1);
                return counts;
            }, []);

            return (
                <div className="max-w-5xl mx-auto px-6 pt-12 pb-20">
                    
                    {/* Encabezado Principal */}
                    <div className="flex flex-col gap-6 md:flex-row md:items-start md:justify-between">
                        <div className="space-y-3">
                            <span className="inline-block bg-gradient-to-r from-teal-500 via-sky-500 to-indigo-500 p-[1px] rounded-full shadow-md">
                                <span className="inline-block bg-slate-900 px-3.5 py-1 text-[10px] font-extrabold tracking-widest text-teal-350 uppercase rounded-full">
                                    ★ Plataforma Corporativa Activa ★
                                </span>
                            </span>
                            <h1 className="font-display text-4xl md:text-5xl font-extrabold tracking-tight bg-gradient-to-r from-teal-600 via-sky-600 to-indigo-600 bg-clip-text text-transparent">
                                Búsqueda de Violaciones por Ciudades
                            </h1>
                            <p className="max-w-2xl text-sm md:text-base leading-relaxed text-slate-500 font-medium">
                                Capacitación integral para el manejo de registros y detección de permisos abiertos en Florida. 
                                Selecciona un recurso, domina el flujo y marca <span className="text-teal-600 font-extrabold">Listo</span>.
                            </p>
                        </div>

                        {/* Tarjeta de Supervisor Luis B. Gomez */}
                        <div className="rounded-2xl border-2 border-emerald-100 bg-white p-4.5 shadow-md min-w-[250px] luxury-shadow relative overflow-hidden">
                            <div className="flex items-center gap-3 relative z-10">
                                <div className="h-11 w-11 flex items-center justify-center bg-gradient-to-tr from-teal-500 to-emerald-500 text-white font-display font-black text-lg rounded-xl shadow-md">
                                    LG
                                </div>
                                <div>
                                    <p className="text-[9px] font-bold uppercase tracking-wider text-emerald-600">Supervisor de Procesos</p>
                                    <p className="font-display font-extrabold text-slate-900 text-sm">Lic. Luis B. Gomez</p>
                                    <div className="mt-0.5 inline-flex items-center gap-1 text-[10px] text-teal-600 font-semibold">
                                        <span className="h-2 w-2 rounded-full bg-teal-500 animate-ping"></span>
                                        <span>Asesoría Activa</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    {/* Centro de Control de Progreso */}
                    <div className="mt-10 overflow-hidden rounded-2xl border-2 border-sky-100 bg-white p-6 shadow-md luxury-shadow relative">
                        <div className="flex flex-col md:flex-row gap-6 md:items-center justify-between">
                            <div className="space-y-3 flex-1">
                                <div className="flex justify-between items-center">
                                    <div>
                                        <h2 className="font-display text-lg font-extrabold text-slate-800">Tu Ruta de Entrenamiento</h2>
                                        <p className="text-xs text-slate-400">Progreso instantáneo registrado de forma autónoma.</p>
                                    </div>
                                    <div className="text-right">
                                        <span className="font-display text-3xl font-black bg-gradient-to-r from-teal-600 to-indigo-600 bg-clip-text text-transparent">{progressPercentage}%</span>
                                        <p className="text-[10px] font-bold uppercase text-indigo-500 tracking-wider font-mono">{completedCount} de {total} Módulos</p>
                                    </div>
                                </div>
                                <div className="h-3.5 w-full bg-slate-100 rounded-full p-[2px]">
                                    <div className="h-full rounded-full bg-gradient-to-r from-teal-400 via-sky-400 to-indigo-600 transition-all duration-500" style={{width: `${progressPercentage}%`}}></div>
                                </div>
                            </div>
                            <button onClick={handleReset} className="inline-flex h-11 items-center justify-center gap-2 rounded-xl border border-red-200 bg-red-50/50 px-4.5 text-xs font-bold text-red-650 hover:bg-red-100/70 transition-colors">
                                Resetear Progreso
                            </button>
                        </div>
                    </div>

                    {/* Filtros e Inputs Interactivos */}
                    <div className="mt-8 flex flex-col md:flex-row md:items-center justify-between gap-4 bg-white p-4.5 rounded-2xl border-2 border-slate-100 shadow-sm luxury-shadow">
                        <div className="relative flex-1 max-w-md">
                            <input 
                                type="text" 
                                placeholder="Buscar temas, módulos o municipios de Florida..."
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                                className="w-full rounded-xl border-2 border-slate-100 bg-slate-50/50 py-2.5 pl-4 pr-10 text-sm outline-none placeholder:text-slate-400 focus:border-teal-500 focus:bg-white transition-all font-sans font-medium"
                            />
                        </div>

                        {/* Tabs de Filtros de Categorías */}
                        <div className="flex flex-wrap items-center gap-2">
                            <div className="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
                                {["All", "Ciudad", "Town", "Village"].map(cat => (
                                    <button 
                                        key={cat} 
                                        onClick={() => setSelectedCategory(cat)}
                                        className={`rounded-lg px-3 py-1.5 text-xs font-bold transition-all ${selectedCategory === cat ? 'bg-slate-900 text-white shadow-sm' : 'text-slate-500 hover:text-slate-900'}`}
                                    >
                                        {cat === "All" ? `Todos (${total})` : `${cat}s (${categoryCounts[cat]})`}
                                    </button>
                                ))}
                            </div>

                            <div className="flex items-center gap-1 bg-slate-100 p-1 rounded-xl">
                                {["All", "Pending", "Completed"].map(st => (
                                    <button 
                                        key={st} 
                                        onClick={() => setStatusFilter(st)}
                                        className={`rounded-lg px-3 py-1.5 text-xs font-bold transition-all ${statusFilter === st ? 'bg-slate-900 text-white shadow-sm' : 'text-slate-500 hover:text-slate-900'}`}
                                    >
                                        {st === "All" ? "Todos" : st === "Pending" ? "Pendientes" : "Listos"}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    {/* Grid de Tarjetas de Módulos */}
                    <div className="mt-8">
                        {filtered.length === 0 ? (
                            <div className="rounded-2xl border-2 border-dashed border-slate-200 bg-white py-16 text-center">
                                <h3 className="font-display text-sm font-bold text-slate-800">No se encontraron resultados</h3>
                                <p className="text-xs text-slate-400 mt-1">Prueba a realizar otra búsqueda o ajusta tus filtros seleccionados.</p>
                            </div>
                        ) : (
                            <div className="grid gap-6 sm:grid-cols-2 lg:grid-cols-3">
                                {filtered.map(module => {
                                    const isDone = completedIds.includes(module.id);
                                    const isManual = module.url === "#";
                                    return (
                                        <div 
                                            key={module.id} 
                                            className={`relative flex flex-col justify-between rounded-2xl border-2 bg-white p-5 transition-all duration-300 luxury-shadow ${isDone ? "border-teal-500 bg-emerald-50/10" : "border-slate-100"}`}
                                        >
                                            {isDone && (
                                                <div className="absolute top-4 right-4 z-10 pointer-events-none">
                                                    <span className="text-emerald-600 text-xl">✔</span>
                                                </div>
                                            )}

                                            <div className="space-y-3.5">
                                                <div className="flex items-center gap-1.5 flex-wrap">
                                                    <span className={`inline-block rounded-lg px-2.5 py-1 text-[10px] font-bold uppercase ${isDone ? 'bg-emerald-600 text-white' : 'bg-slate-100 text-slate-600'}`}>
                                                        {module.tag}
                                                    </span>
                                                    <span className={`inline-block rounded-lg px-2.5 py-1 text-[10px] font-bold uppercase border ${module.category === 'Village' ? 'bg-indigo-50 text-indigo-700 border-indigo-100' : module.category === 'Town' ? 'bg-amber-50 text-amber-800 border-amber-200' : 'bg-teal-50 text-teal-700 border-teal-100'}`}>
                                                        {module.category}
                                                    </span>
                                                </div>

                                                <div>
                                                    <h3 className="font-display font-extrabold text-slate-900 leading-snug text-base">
                                                        {module.title}
                                                    </h3>
                                                    <p className="mt-1.5 text-xs text-slate-500 leading-relaxed font-sans font-medium line-clamp-3">
                                                        {module.desc}
                                                    </p>
                                                </div>
                                            </div>

                                            {/* Acciones de la Tarjeta */}
                                            <div className="mt-6 pt-4 border-t border-slate-100 flex items-center gap-2">
                                                {isManual ? (
                                                    <button 
                                                        onClick={() => setActiveInfoModal(module)}
                                                        className="inline-flex flex-1 items-center justify-center rounded-xl border-2 border-amber-200 bg-amber-50/50 px-3 py-2.5 text-xs font-bold text-amber-800 hover:bg-amber-100 transition-colors"
                                                    >
                                                        Búsqueda Manual
                                                    </button>
                                                ) : (
                                                    <a 
                                                        href={module.url} 
                                                        target="_blank" 
                                                        className="inline-flex flex-1 items-center justify-center rounded-xl bg-gradient-to-r from-teal-600 to-sky-600 px-3 py-2.5 text-xs font-bold text-white hover:opacity-90 transition-all shadow-sm"
                                                    >
                                                        Ver Recurso
                                                    </a>
                                                )}

                                                <button 
                                                    onClick={() => handleToggleComplete(module.id)}
                                                    className={`inline-flex px-3.5 py-2.5 rounded-xl text-xs font-extrabold transition-all cursor-pointer ${isDone ? 'bg-emerald-600 text-white hover:bg-emerald-700' : 'bg-slate-100 text-slate-700 hover:bg-slate-205'}`}
                                                >
                                                    {isDone ? "✓ Completado" : "Pendiente"}
                                                </button>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>

                    {/* Guía de Metodología de Trabajo Corporativo */}
                    <div className="mt-16 rounded-2xl border-2 border-indigo-100 bg-gradient-to-b from-white to-slate-50/50 p-6 md:p-8 shadow-sm luxury-shadow relative overflow-hidden">
                        <h3 className="font-display text-lg font-bold text-slate-900 flex items-center gap-2">
                            <span>Guía Práctica & Metodología de Trabajo</span>
                        </h3>
                        <p className="mt-2 text-sm text-slate-500 font-medium font-sans">
                            Sigue las recomendaciones del equipo de auditoría general para una verificación de violaciones sin desvíos técnicos:
                        </p>
                        
                        <div className="mt-8 grid gap-6 sm:grid-cols-3 relative z-10">
                            {[
                                { step: 1, title: "Material Audiovisual", bg: "bg-teal-50 text-teal-700 border-teal-100", desc: "Usa el recurso directo enlazado en Google Drive para examinar el flujo normativo de la ciudad." },
                                { step: 2, title: "Portales de Búsqueda Manual", bg: "bg-amber-50 text-amber-700 border-amber-100", desc: "Abre el sitio oficial de la ciudad en municipios sin material directo y usa el folio parcelario o dirección." },
                                { step: 3, title: "Actualización Automatizada", bg: "bg-indigo-50 text-indigo-700 border-indigo-100", desc: "Marca 'Listo' en el checklist y tu progreso se guardará automáticamente en este navegador local." }
                            ].map((s, i) => (
                                <div key={i} className="space-y-3.5 p-4 rounded-xl bg-white border border-slate-150 shadow-sm">
                                    <div className={`flex h-9 w-9 items-center justify-center rounded-xl text-xs font-extrabold border ${s.bg}`}>
                                        {s.step}
                                    </div>
                                    <p className="text-xs font-bold text-slate-800">{s.title}</p>
                                    <p className="text-xs text-slate-400 leading-relaxed font-sans font-medium">{s.desc}</p>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Modal para Búsquedas Manuales */}
                    {activeInfoModal && (
                        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
                            <div className="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onClick={() => setActiveInfoModal(null)}></div>
                            <div className="relative w-full max-w-lg rounded-3xl border-2 border-amber-105 bg-white p-6 shadow-2xl z-10 overflow-hidden">
                                <div className="absolute top-0 left-0 right-0 h-2 bg-gradient-to-r from-amber-400 via-teal-400 to-indigo-500"></div>

                                <div className="flex flex-col items-start gap-4 mt-2">
                                    <div className="flex items-center gap-1.5">
                                        <span className="text-[10px] font-bold tracking-wider uppercase text-amber-700 bg-amber-50 px-2 py-0.5 rounded-md border border-amber-100">
                                            {activeInfoModal.tag} — Flujo Manual
                                        </span>
                                        <span className="text-[10px] bg-slate-100 text-slate-700 font-bold tracking-wider uppercase px-2 py-0.5 rounded-md">
                                            {activeInfoModal.category}
                                        </span>
                                    </div>
                                    
                                    <h3 className="font-display text-2xl font-black text-slate-900 leading-tight">
                                        Búsqueda de {activeInfoModal.cityName}
                                    </h3>

                                    <div className="space-y-3 text-sm text-slate-500 font-medium">
                                        <p>Para este municipio el flujo de código y violaciones consiste de consultas en su propio portal público:</p>
                                        <ul className="space-y-2.5 border-l-2 border-amber-300 pl-4 py-1 text-xs text-slate-650 font-sans">
                                            <li><strong>Paso 1:</strong> Accede al buscador de registros, portal de records estatales o <em>Citizen Self Service (CSS)</em> de la ciudad.</li>
                                            <li><strong>Paso 2:</strong> Introduce preferiblemente el número de Folio Parcelario (Parcel ID) o folio municipal para agilizar el rastreo de incidencias vigentes.</li>
                                            <li><strong>Paso 3:</strong> Verifica los registros del departamento de <em>Building Division</em> o <em>Code Enforcement</em>.</li>
                                        </ul>
                                        <p className="text-xs bg-amber-50/50 border border-amber-100 p-3 rounded-xl text-amber-800 italic">
                                            "Cualquier duda adicional o fallos del portal municipal de esta subdivisión puede escalarse con el supervisor, Lic. Luis B. Gomez."
                                        </p>
                                    </div>

                                    <div className="mt-4 flex w-full gap-3">
                                        <button 
                                            onClick={() => {
                                                if (!completedIds.includes(activeInfoModal.id)) handleToggleComplete(activeInfoModal.id);
                                                setActiveInfoModal(null);
                                            }}
                                            className="flex-1 rounded-xl bg-gradient-to-r from-teal-600 to-indigo-600 py-3 text-center text-xs font-bold text-white shadow-md hover:opacity-95 transition-all"
                                        >
                                            Marcar Módulo Completado
                                        </button>
                                        <button onClick={() => setActiveInfoModal(null)} className="rounded-xl border border-slate-200 py-3 px-5 text-center text-xs font-bold text-slate-600 hover:bg-slate-50 transition-colors">
                                            Cerrar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
